name: Tecnolareiras → GitHub Pages

on:
  push:
    branches: [claude/tecnolareiras-platform-710jwe]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tecnolareiras/package-lock.json

      - name: Install dependencies
        working-directory: tecnolareiras
        run: npm install

      - name: Generate Prisma Client
        working-directory: tecnolareiras
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Remove API routes (incompatible with static export)
        run: mv tecnolareiras/src/app/api tecnolareiras/src/app/_api_disabled

      - name: Build static export
        working-directory: tecnolareiras
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          AUTH_SECRET: "github-pages-static-build-secret-placeholder-32c"
          NEXTAUTH_URL: "https://danielmarques196-lgtm.github.io/asae-uovi-planeamento"
          NEXT_PUBLIC_APP_URL: "https://danielmarques196-lgtm.github.io/asae-uovi-planeamento"
          NEXT_PUBLIC_APP_NAME: "Tecnolareiras"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tecnolareiras/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
